version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - misspell
    - unconvert
    - unparam
    - gocyclo
    - gocritic
    - prealloc
  settings:
    gocyclo:
      min-complexity: 60
    govet:
      disable:
        - fieldalignment
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gocyclo
          - prealloc
          - unparam

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/splch/goqu
