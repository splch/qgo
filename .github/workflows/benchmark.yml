name: Benchmark

on:
  push:
    branches: [main]

permissions:
  contents: write
  deployments: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run benchmarks
        run: |
          go test ./sim/statevector/ -bench=. -count=5 -benchmem -run=^$ -timeout=10m | tee bench.txt
          go test ./sim/densitymatrix/ -bench=. -count=5 -benchmem -run=^$ -timeout=10m | tee -a bench.txt

      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: go
          output-file-path: bench.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: "150%"
          comment-on-alert: true
          fail-on-alert: false
          benchmark-data-dir-path: dev/bench
