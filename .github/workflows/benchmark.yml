name: Benchmark

on:
  push:
    branches: [main]

permissions:
  contents: write
  deployments: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run benchmarks
        run: |
          go test ./sim/statevector/ -bench=. -count=5 -benchmem -run=^$ -timeout=10m | tee bench.txt
          go test ./sim/densitymatrix/ -bench=. -count=5 -benchmem -run=^$ -timeout=10m | tee -a bench.txt

      - name: Create gh-pages branch if needed
        run: |
          if ! git ls-remote --exit-code origin gh-pages > /dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git switch --orphan gh-pages
            git commit --allow-empty -m "Initialize gh-pages for benchmark data"
            git push origin gh-pages
            git checkout main
          fi

      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: go
          output-file-path: bench.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: "150%"
          comment-on-alert: true
          fail-on-alert: false
          benchmark-data-dir-path: dev/bench
